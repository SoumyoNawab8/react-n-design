name: Deploy Storybook to GitHub Pages

on:
  # Run automatically when you push to the main branch
  push:
    branches:
      - master
      - v_121  # Also trigger on current development branch
  # Allow manual trigger
  workflow_dispatch:

# Allow the job to create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking dist directory:"
          ls -la dist/
          echo "Checking for index.d.ts:"
          test -f dist/index.d.ts && echo "✅ index.d.ts found" || echo "❌ index.d.ts missing"

      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
